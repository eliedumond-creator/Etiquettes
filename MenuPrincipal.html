<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <style>
        body { font-family: sans-serif; margin: 15px; background-color: #f0f2f5; }
        .menu-title { font-size: 1.2em; font-weight: bold; margin-bottom: 20px; color: #155724; }
        .menu-button {
            background-color: #375F9B ;
            color: white;
            padding: 12px 15px;
            margin-bottom: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 1em;
            transition: background-color 0.3s;
            text-align: left; 
        }
        .menu-button:hover {
            background-color: #0b7dda;
        }
        .icon {
            margin-right: 10px;
        }
        /* Style spécifique pour le bouton d'archivage/maintenance */
        .btn-maintenance {
            background-color: #f44336; /* Rouge */
            margin-top: 25px;
        }
        .btn-maintenance:hover {
            background-color: #d32f2f; 
        }
    </style>
</head>
<body>
    <div class="menu-title">Menu d'Actions Rapides</div>
    <hr>
    
    <button class="menu-button" onclick="lancerSaisie()">
        <span class="icon">📝</span> Nouvelle Saisie
    </button>

    <button class="menu-button" onclick="lancerModification()">
        <span class="icon">✏️</span> Modifier Saisie / Lever un litige
    </button>

    <button class="menu-button" onclick="lancerReimpression()">
        <span class="icon">🖨️</span> Réimpression d'une étiquette
    </button>
    
    <button class="menu-button" onclick="lancerControleDepose()">
        <span class="icon">✅</span> Dépose / Livrer un contenant
    </button>

    
    
    <script>
        // Les fonctions ci-dessous appellent les fonctions serveur correspondantes
        function lancerSaisie() { google.script.run.showDialog(); }
        function lancerModification() { google.script.run.ouvrirDialogueModification(); }
        function lancerReimpression() { google.script.run.ouvrirDialogueReimpression(); }
        function lancerControleDepose() { google.script.run.ouvrirDialogueControleDepose(); }
        function lancerArchivage() { google.script.run.archiverAnciennesSaisies(); }
    </script>
</body>
</html>
