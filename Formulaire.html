<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: sans-serif; margin: 10px; background-color: #f0f2f5; color: #333; }
    .form-group { margin-bottom: 10px; }
    label { display: block; margin-bottom: 2px; font-weight: bold; font-size: 0.9em; }
    input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    input:focus, select:focus, textarea:focus { border-color: #2196F3; box-shadow: 0 0 5px rgba(33, 150, 243, 0.5); outline: none; }
    .btn-print { color: white; padding: 10px 15px; margin: 6px 0; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1em; background-color: #375F9B; }
    .btn-delete { background-color: #f44336; }
    .button { background-color: #375F9B; }
    .btn-print:hover { opacity: 0.9; }
    #message, #deleteMessage { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; font-weight: bold; font-size: 0.9em;}
    .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6fb; }
    .instruction-box { padding: 12px; background-color: #f0f8ff; color: #004085; border: 1px solid #b8daff; border-radius: 4px; margin-top: 15px; font-size: 0.9em; }
     /* NOUVEAU STYLE : Griser les champs optionnels (Lot et Série) */
    input[name="lot"], input[name="serie"] {
        background-color: #f5f5f5; /* Gris très clair */
        color: #666; /* Texte gris foncé */
  </style>
</head>
<body>

  <div id="saisiePanel">
    <form id="saisieForm">
      
      <div class="form-group">
        <label for="lieuDepart">Lieu de départ :</label>
        <select id="lieuDepart" name="lieuDepart" required>
          <option value="">Sélectionnez...</option>
          <? for (var i = 0; i < lieuxDepart.length; i++) { ?>
            <option value="<?= lieuxDepart[i] ?>"><?= lieuxDepart[i] ?></option>
          <? } ?>
        </select>
      </div>

      <div class="form-group">
        <label for="Motif">Motif :</label>
        <select id="Motif" name="Motif" required>
          <option value="">Sélectionnez...</option>
          <? for (var i = 0; i < TypeOption.length; i++) { ?>
            <option value="<?= TypeOption[i] ?>"><?= TypeOption[i] ?></option>
          <? } ?>
        </select>
      </div>

      <div class="form-group">
        <label for="lot">Optionnel : N° de lot : </label>
        <input type="text" id="lot" name="lot" >
      </div>

      <div class="form-group">
        <label for="serie">Optionnel : N° de série :</label>
        <input type="text" id="serie" name="serie">
      </div>

      <div class="form-group">
        <label for="quantite">Quantité d'unité de manutention:</label>
        <input type="number" id="quantite" name="quantite" min="1" required>
      </div>

      <div class="form-group">
        <label for="TypeUnite">Type d'unité de manutention:</label>
        <select id="TypeUnite" name="TypeUnite" required>
          <option value="">Sélectionnez...</option>
          <? for (var i = 0; i < ManutentionOptions.length; i++) { ?>
            <option value="<?= ManutentionOptions[i] ?>"><?= ManutentionOptions[i] ?></option>
          <? } ?>
        </select>
      </div>

      <div class="form-group">
        <label for="lieuDepose">Lieu de dépose :</label>
        <select id="lieuDepose" name="lieuDepose" required>
          <option value="">Sélectionnez...</option>
          <? for (var i = 0; i < lieuxDepart.length; i++) { ?>
            <option value="<?= lieuxDepart[i] ?>"><?= lieuxDepart[i] ?></option>
          <? } ?>
        </select>
      </div>

      <div class="form-group">
      <label>Expéditions concenées (Ex: SHP000012345) - Optionnel :</label>
      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px;">
        <input type="text" id="shp1" name="shp1" placeholder="SHP n°1" maxlength="12">
        <input type="text" id="shp2" name="shp2" placeholder="SHP n°2"maxlength="12">
        <input type="text" id="shp3" name="shp3" placeholder="SHP n°3"maxlength="12">
        <input type="text" id="shp4" name="shp4" placeholder="SHP n°4"maxlength="12">
      </div>

      <label for="commentaireLibre">Commentaire Libre : Max. 200 char total avec les expés</label>
      <textarea id="commentaireLibre" name="commentaireLibre" rows="2" placeholder="Saisie libre"></textarea>
    </div>

    <div id="validationMessage" class="error" style="display:none;"></div>

      <div class="form-group">
        <label for="litige">Litige ouvert :</label>
        <select id="litige" name="litige">
          <option value="">Conforme</option>
          <? for (var i = 0; i < lieuxLitiges.length; i++) { ?>
            <option value="<?= lieuxLitiges[i] ?>"><?= lieuxLitiges[i] ?></option>
          <? } ?>
        </select>
      </div>

      <hr>
      
      <button type="button" class="btn-print" onclick="handlePrint('Etiquette')">Imprimer Étiquette</button>
      
    </form>
    <div id="message"></div>
  </div>

  <div id="instructionPanel" style="display:none;">
    <h3 id="instructionTitle" style="color:#155724;">✅ Étiquette créée</h3>
    
    <div class="instruction-box">
        <p>Sélectionnez une cellule sur l'étiquette<br /><br /> Cliquez sur <span style="font-weight:bold;">CTRL + P</span> pour imprimer.<br /><br /><br />Le document <strong id="sheetNameDisplay"></strong> est actif.</p>
    </div>
    
    <h3 style="margin-top:20px;">Nettoyage</h3>
    <p>Cliquez pour supprimer la feuille temporaire :</p>
    
    <button type="button" class="btn-print btn-delete" onclick="handleDelete()">Supprimer et Nouvelle Saisie</button>
    
    <div id="deleteMessage"></div>
  </div>
<script>
    let currentSheetName = null;

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('saisieForm').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault(); 
                handlePrint('Etiquette'); 
            }
        });
    });



function validateCommentaire() {
        const shpFields = ['shp1', 'shp2', 'shp3', 'shp4'];
        const libreField = document.getElementById('commentaireLibre').value.trim();
        const messageDiv = document.getElementById('validationMessage');
        const shpRegex = /^(SHP|XPE)\d{9}$/i; 
// On définit les deux formats acceptés
        const regexClassique = /^(SHP|XPE)\d{9}$/i; 
        const regexSpecifique = /^(SHPCS)\d{7}$/i;
        let totalCommentaire = [];
        let validationOK = true;

        messageDiv.style.display = 'none';

        // 1. Validation du format SHP et construction de la chaîne
        shpFields.forEach(id => {
            const value = document.getElementById(id).value.trim();    
            if (value) {
              const isClassique = regexClassique.test(value);
              const isSpecifique = regexSpecifique.test(value);
                if (!isClassique && !isSpecifique) {
                    messageDiv.innerHTML = `❌ Erreur: Le champ ${document.getElementById(id).placeholder} n'est pas au bon format.<br>
                Formats acceptés : SHP + 9 chiffres OU SHPCS + 7 chiffres.`;
                    messageDiv.style.display = 'block';
                    validationOK = false;
                }
                totalCommentaire.push(value);
            }
        });

        if (!validationOK) return false;

        // 2. Ajout du commentaire libre
        if (libreField) {
            totalCommentaire.push(libreField);
        }

        const finalCommentaire = totalCommentaire.join(' | ');

        // 3. Validation de la longueur totale
        if (finalCommentaire.length > 200) {
            messageDiv.innerHTML = `❌ Erreur: Le commentaire total fait ${finalCommentaire.length} caractères (Max. 200). Veuillez raccourcir le commentaire libre.`;
            messageDiv.style.display = 'block';
            return false;
        }
        
        // Stocker la chaîne finale dans le formulaire pour l'envoi
        document.getElementById('saisieForm').finalCommentaire = finalCommentaire;
        return true;
    }
    function getFormData() {
      const formData = {};
      const elements = document.getElementById('saisieForm').elements;
      for (const element of elements) {
        if (element.name) {
          formData[element.name] = (element.name === 'quantite') ? parseFloat(element.value) : element.value;
        }
      }
      return formData;
    }

    function handlePrint(format) {
      const form = document.getElementById('saisieForm');
      if (!validateCommentaire()) {
          return;
      }
      if (!form.checkValidity()) {
        return;
      }
      // Récupération des données du formulaire (le reste est inchangé)
      var formData = {};
      var elements = form.elements;
      for (var i = 0; i < elements.length; i++) {
        var element = elements[i];
        if (element.name) {
          if (element.name === 'quantite') {
             formData[element.name] = parseFloat(element.value);
          } else {
             
             formData[element.name] = element.value;
          }
        }
      }
      
      // Ajout du commentaire final structuré
      formData.commentaire = form.finalCommentaire;
      toggleButtons(true);
      
      const messageDiv = document.getElementById('message');
      messageDiv.className = 'success';
      messageDiv.innerHTML = 'Traitement en cours...';
      messageDiv.style.display = 'block';

      google.script.run
          .withSuccessHandler(onSuccess)
          .withFailureHandler(onFailure)
          .imprimer(formData, format);
    }
    
    function onSuccess(result) {
      toggleButtons(false); 
      document.getElementById('message').style.display = 'none';

      if (result.sheetName) {
          currentSheetName = result.sheetName;
          
          document.getElementById('instructionTitle').textContent = `✅ Étiquette créée`;
          document.getElementById('sheetNameDisplay').textContent = result.sheetName;
          
          document.getElementById('saisiePanel').style.display = 'none';
          document.getElementById('instructionPanel').style.display = 'block';
          
          const deleteMsgDiv = document.getElementById('deleteMessage');
          deleteMsgDiv.className = 'success';
          deleteMsgDiv.innerHTML = result.message;
          deleteMsgDiv.style.display = 'block';
          
      } else {
          const messageDiv = document.getElementById('message');
          messageDiv.innerHTML = '✅ Succès : ' + result.message; 
          messageDiv.style.display = 'block';
      }
    }
    
    function onFailure(error) {
      toggleButtons(false); 
      const messageDiv = document.getElementById('message');
      messageDiv.className = 'error'; 
      messageDiv.innerHTML = '❌ Erreur: ' + error.message;
      messageDiv.style.display = 'block';
    }
    
    function handleDelete() {
      if (!currentSheetName) return;
      
      toggleButtons(true, 'delete');

      const deleteMsgDiv = document.getElementById('deleteMessage');
      deleteMsgDiv.className = 'success';
      deleteMsgDiv.innerHTML = 'Suppression en cours...';
      
      google.script.run
          .withSuccessHandler(onDeleteSuccess)
          .withFailureHandler(onDeleteFailure)
          .deleteSheetByName(currentSheetName);
    }

    function onDeleteSuccess(deleteMessage) {
      document.getElementById('deleteMessage').className = 'success';
      document.getElementById('deleteMessage').innerHTML = '✅ ' + deleteMessage;
      
      // Réinitialisation de l'interface du formulaire (pour une nouvelle saisie)
      document.getElementById('saisieForm').reset();
      document.getElementById('instructionPanel').style.display = 'none';
      document.getElementById('saisiePanel').style.display = 'block';
      
      currentSheetName = null;
      toggleButtons(false, 'delete'); 
      
      // CORRECTION : Supprime l'appel non nécessaire à host.close()
      // et ouvre immédiatement le menu principal.
      google.script.run.showMenuPrincipal(); 
    }

    function onDeleteFailure(error) {
      toggleButtons(false, 'delete');
      const deleteMsgDiv = document.getElementById('deleteMessage');
      deleteMsgDiv.className = 'error';
      deleteMsgDiv.innerHTML = '❌ Erreur de suppression: ' + error.message;
    }

    function toggleButtons(disable, panelType) {
      const selector = (panelType === 'delete') ? '#instructionPanel button' : '#saisiePanel button';
      document.querySelectorAll(selector).forEach(button => {
          button.disabled = disable;
      });
    }
  </script>
</body>
</html>
